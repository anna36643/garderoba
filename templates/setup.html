{% extends "base.html" %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div style="width: 100%; max-width: 480px;">

        <div style="text-align: center; margin-bottom: 48px;">
            <div style="font-size: 48px; margin-bottom: 16px;">🌿</div>
            <h1 style="font-family: 'Lora', serif; font-size: 28px; color: var(--brown-dark); margin-bottom: 12px; line-height: 1.3;">
                {{ s.setup_title }}
            </h1>
            <p style="color: var(--text-soft); font-size: 15px; line-height: 1.6; max-width: 360px; margin: 0 auto;">
                {{ s.setup_subtitle }}
            </p>
        </div>

        <div style="background: white; border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow-medium); border: 1px solid var(--beige-dark);">
            <form method="POST" action="/setup">

                <div style="margin-bottom: 28px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;">
                        {{ s.setup_furniture_name }}
                    </label>
                    <input type="text" name="furniture_name" required placeholder="{{ s.setup_furniture_name_hint }}"
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: var(--radius-small); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: var(--cream); outline: none; transition: border-color 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'"
                        onblur="this.style.borderColor='var(--beige-dark)'">
                </div>

                <div style="margin-bottom: 28px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase;">
                        {{ s.setup_furniture_type }}
                    </label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <label style="cursor: pointer;">
                            <input type="radio" name="furniture_type" value="szafa" checked style="display: none;" class="type-radio">
                            <div class="type-card" data-value="szafa"
                                style="padding: 16px; border: 2px solid var(--sage); border-radius: var(--radius-small); text-align: center; background: var(--sage-pale); transition: all 0.2s ease;">
                                <div style="font-size: 28px; margin-bottom: 6px;">🚪</div>
                                <div style="font-size: 14px; font-weight: 600; color: var(--brown-dark);">{{ s.setup_type_wardrobe }}</div>
                            </div>
                        </label>
                        <label style="cursor: pointer;">
                            <input type="radio" name="furniture_type" value="komoda" style="display: none;" class="type-radio">
                            <div class="type-card" data-value="komoda"
                                style="padding: 16px; border: 2px solid var(--beige-dark); border-radius: var(--radius-small); text-align: center; background: var(--cream); transition: all 0.2s ease;">
                                <div style="font-size: 28px; margin-bottom: 6px;">🗄️</div>
                                <div style="font-size: 14px; font-weight: 600; color: var(--text-soft);">{{ s.setup_type_dresser }}</div>
                            </div>
                        </label>
                    </div>
                </div>

                <div style="margin-bottom: 36px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;">
                        {{ s.setup_person_name }}
                    </label>
                    <input type="text" name="person_name" required placeholder="{{ s.setup_person_name_hint }}"
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: var(--radius-small); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: var(--cream); outline: none; transition: border-color 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'"
                        onblur="this.style.borderColor='var(--beige-dark)'">
                </div>

                <button type="submit"
                    style="width: 100%; padding: 14px; background: var(--sage); color: white; border: none; border-radius: var(--radius-small); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s ease, transform 0.1s ease;"
                    onmouseover="this.style.background='var(--brown-light)'"
                    onmouseout="this.style.background='var(--sage)'"
                    onmousedown="this.style.transform='scale(0.98)'"
                    onmouseup="this.style.transform='scale(1)'">
                    {{ s.setup_submit }}
                </button>

            </form>
        </div>

    </div>
</div>

<script>
    const radios = document.querySelectorAll('.type-radio');
    const cards = document.querySelectorAll('.type-card');

    radios.forEach(radio => {
        radio.addEventListener('change', () => {
            cards.forEach(card => {
                card.style.border = '2px solid var(--beige-dark)';
                card.style.background = 'var(--cream)';
                card.querySelector('div:last-child').style.color = 'var(--text-soft)';
            });
            const selectedCard = radio.nextElementSibling;
            selectedCard.style.border = '2px solid var(--sage)';
            selectedCard.style.background = 'var(--sage-pale)';
            selectedCard.querySelector('div:last-child').style.color = 'var(--brown-dark)';
        });
    });
</script>
{% endblock %}
