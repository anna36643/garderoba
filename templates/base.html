<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ s.app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sage: #87a878;
            --sage-light: #b5c9aa;
            --sage-pale: #e8f0e4;
            --cream: #faf6ef;
            --beige: #f0e8d8;
            --beige-dark: #e0d0b8;
            --brown: #8b6f4e;
            --brown-light: #b8956a;
            --brown-dark: #5c4a32;
            --text-main: #3d2e1e;
            --text-soft: #7a6552;
            --text-muted: #a89880;
            --shadow-soft: 0 4px 20px rgba(139, 111, 78, 0.12);
            --shadow-medium: 0 8px 32px rgba(139, 111, 78, 0.18);
            --radius: 16px;
            --radius-small: 10px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--cream);
            color: var(--text-main);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(135, 168, 120, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(184, 149, 106, 0.08) 0%, transparent 60%);
        }

        .flash {
            padding: 12px 20px;
            border-radius: var(--radius-small);
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
        }

        .flash.error {
            background-color: #fdecea;
            color: #8b3a3a;
            border: 1px solid #f5c6c6;
        }

        .flash.success {
            background-color: var(--sage-pale);
            color: var(--brown-dark);
            border: 1px solid var(--sage-light);
        }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div style="position: fixed; top: 20px; right: 20px; z-index: 1000; max-width: 360px;">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
