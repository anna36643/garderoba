{% extends "base.html" %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div style="width: 100%; max-width: 420px;">

        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-family: 'Lora', serif; font-size: 36px; color: var(--brown-dark); margin-bottom: 8px; letter-spacing: -0.3px;">
                {{ s.app_name }}
            </h1>
            <p style="color: var(--text-soft); font-size: 15px; font-style: italic;">{{ s.register_title }}</p>
        </div>

        <div style="background: linear-gradient(160deg, #faf6ef 0%, #f0e8d8 100%); border-radius: 20px; padding: 40px; box-shadow: 0 24px 64px rgba(61,40,20,0.18), inset 0 1px 0 rgba(255,255,255,0.7); border: 1px solid rgba(184,149,106,0.3);">
            <form method="POST" action="/register">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.8px; text-transform: uppercase;">
                        {{ s.register_email }}
                    </label>
                    <input type="email" name="email" required
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: rgba(255,255,255,0.7); outline: none; transition: border-color 0.2s ease, background 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'; this.style.background='white';"
                        onblur="this.style.borderColor='var(--beige-dark)'; this.style.background='rgba(255,255,255,0.7)';">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.8px; text-transform: uppercase;">
                        {{ s.register_password }}
                    </label>
                    <input type="password" name="password" required
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: rgba(255,255,255,0.7); outline: none; transition: border-color 0.2s ease, background 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'; this.style.background='white';"
                        onblur="this.style.borderColor='var(--beige-dark)'; this.style.background='rgba(255,255,255,0.7)';">
                </div>

                <div style="margin-bottom: 32px;">
                    <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.8px; text-transform: uppercase;">
                        {{ s.register_invite }}
                    </label>
                    <input type="text" name="invite_code" required
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: 12px; font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: rgba(255,255,255,0.7); outline: none; transition: border-color 0.2s ease, background 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'; this.style.background='white';"
                        onblur="this.style.borderColor='var(--beige-dark)'; this.style.background='rgba(255,255,255,0.7)';">
                </div>

                <button type="submit"
                    style="width: 100%; padding: 14px; background: var(--sage); color: white; border: none; border-radius: 12px; font-family: 'Lora', serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s ease, transform 0.1s ease; box-shadow: 0 4px 14px rgba(135,168,120,0.3);"
                    onmouseover="this.style.background='var(--brown-light)'"
                    onmouseout="this.style.background='var(--sage)'"
                    onmousedown="this.style.transform='scale(0.98)'"
                    onmouseup="this.style.transform='scale(1)'">
                    {{ s.register_submit }}
                </button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 24px; color: var(--text-soft); font-size: 14px;">
            {{ s.register_have_account }}
            <a href="/login" style="color: var(--brown); text-decoration: none; font-weight: 600; font-family: 'Lora', serif;">{{ s.register_login_link }}</a>
        </p>
    </div>
</div>
{% endblock %}
