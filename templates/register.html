{% extends "base.html" %}
{% block content %}
<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
    <div style="width: 100%; max-width: 420px;">

        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-family: 'Lora', serif; font-size: 32px; color: var(--brown-dark); margin-bottom: 8px;">
                {{ s.app_name }}
            </h1>
            <p style="color: var(--text-soft); font-size: 15px;">{{ s.register_title }}</p>
        </div>

        <div style="background: white; border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow-medium); border: 1px solid var(--beige-dark);">
            <form method="POST" action="/register">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;">
                        {{ s.register_email }}
                    </label>
                    <input type="email" name="email" required
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: var(--radius-small); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: var(--cream); outline: none; transition: border-color 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'"
                        onblur="this.style.borderColor='var(--beige-dark)'">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;">
                        {{ s.register_password }}
                    </label>
                    <input type="password" name="password" required
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: var(--radius-small); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: var(--cream); outline: none; transition: border-color 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'"
                        onblur="this.style.borderColor='var(--beige-dark)'">
                </div>

                <div style="margin-bottom: 32px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: var(--text-soft); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase;">
                        {{ s.register_invite }}
                    </label>
                    <input type="text" name="invite_code" required
                        style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--beige-dark); border-radius: var(--radius-small); font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--text-main); background: var(--cream); outline: none; transition: border-color 0.2s ease;"
                        onfocus="this.style.borderColor='var(--sage)'"
                        onblur="this.style.borderColor='var(--beige-dark)'">
                </div>

                <button type="submit"
                    style="width: 100%; padding: 14px; background: var(--sage); color: white; border: none; border-radius: var(--radius-small); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s ease, transform 0.1s ease;"
                    onmouseover="this.style.background='var(--sage-light)'"
                    onmouseout="this.style.background='var(--sage)'"
                    onmousedown="this.style.transform='scale(0.98)'"
                    onmouseup="this.style.transform='scale(1)'">
                    {{ s.register_submit }}
                </button>
            </form>
        </div>

        <p style="text-align: center; margin-top: 24px; color: var(--text-soft); font-size: 14px;">
            {{ s.register_have_account }}
            <a href="/login" style="color: var(--brown); text-decoration: none; font-weight: 600;">{{ s.register_login_link }}</a>
        </p>

    </div>
</div>
{% endblock %}
